<!DOCTYPE html>
<html lang="hi">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { margin: 0; background: #050505; color: #fff; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        
        /* Glassmorphism Hero Section */
        .hero { min-height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; background: radial-gradient(circle at center, #1a1a1a 0%, #000 100%); padding: 20px; }
        h1 { font-size: 3rem; margin: 0; letter-spacing: -2px; text-transform: uppercase; }
        .hero p { color: #888; margin-bottom: 30px; font-weight: 300; }
        
        /* Animated Button */
        .btn { padding: 18px 40px; background: transparent; border: 1px solid #fff; color: #fff; text-decoration: none; border-radius: 50px; transition: 0.5s; backdrop-filter: blur(10px); }
        .btn:hover { background: #fff; color: #000; transform: scale(1.05); }

        /* Floating Watermark */
        .watermark { position: fixed; top: 10%; width: 100%; text-align: center; font-size: 12vw; color: rgba(255,255,255,0.02); pointer-events: none; font-weight: 900; }

        .socials { margin-top: 50px; }
        .socials a { color: #555; font-size: 24px; margin: 0 15px; transition: 0.3s; }
        .socials a:hover { color: #00bcd4; }
    </style>
</head>
<body>
    <div class="watermark">MASTERCUT</div>
    <div class="hero">
        <h1 data-aos="fade-up">MASTERCUTLAB</h1>
        <p>Cinematic Storytelling | Professional Editing</p>
        <a href="services.html" class="btn">ENTER STUDIO</a>
        <div class="socials">
            <a href="https://youtube.com/@defiant_edits"><i class="fab fa-youtube"></i></a>
            <a href="https://www.instagram.com/sub.hhhh.nn"><i class="fab fa-instagram"></i></a>
        </div>
    </div>
</body>
</html>
