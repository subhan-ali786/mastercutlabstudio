<!DOCTYPE html>
<html lang="hi"><head><meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
    body { background: #000; color: #fff; font-family: 'Outfit', sans-serif; height: 100vh; display: flex; align-items: center; justify-content: center; }
    .box { background: rgba(255,255,255,0.03); padding: 40px; border-radius: 30px; border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(20px); text-align: center; }
    .price { font-size: 3rem; color: #00bcd4; font-weight: bold; }
    .btn-wa { display: block; margin-top: 30px; padding: 15px; background: #25D366; color: #fff; text-decoration: none; border-radius: 15px; }
</style></head><body>
    <div class="box">
        <h1 id="title">Loading...</h1>
        <div class="price" id="desc">₹0</div>
        <a href="https://wa.me/917055495075" class="btn-wa">BOOK NOW VIA WHATSAPP</a>
    </div>
<script>
    const data = {
        '1': ["Cinematic Short Film", "₹9,999"], '2': ["Cinematic Reel", "₹119"],
        '3': ["Shop Promotion", "₹1,799"], '4': ["Vlog", "₹300"],
        '5': ["Podcast", "₹4,999"], '6': ["Long Video", "₹9,999"],
        '7': ["Reel", "₹119"], '8': ["Product Ad", "₹499"], '9': ["Event", "₹9,999"]
    };
    const cat = new URLSearchParams(window.location.search).get('cat');
    document.getElementById('title').innerText = data[cat][0];
    document.getElementById('desc').innerText = data[cat][1];
</script></body></html>
